<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <meta name="description" content="QuiztalWorld - An interactive Web3 quiz game in the metaverse">
  <meta name="theme-color" content="#2c3e50">
  
  <!-- Mobile-specific meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="QuiztalWorld">
  
  <!-- Prevent iOS Safari from automatically detecting phone numbers -->
  <meta name="format-detection" content="telephone=no">
  
  <title>Metaverse Quiztal World</title>
  
  <style>
    /* Mobile-optimized base styles */
    * {
      box-sizing: border-box;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #2c3e50;
      font-family: Arial, sans-serif;
      -webkit-overflow-scrolling: touch;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    
    /* Prevent zoom on input focus */
    input, textarea, select {
      font-size: 16px;
    }
    
    /* Loading container */
    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #2c3e50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    
    /* Loading text */
    #loading-text {
      color: #f1c40f;
      font-size: 24px;
      margin-bottom: 30px;
      text-align: center;
    }
    
    /* Progress bar container */
    #progress-container {
      width: 80%;
      max-width: 400px;
      height: 20px;
      background-color: #34495e;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
    
    /* Progress bar */
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f1c40f, #e67e22);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    
    /* Progress percentage */
    #progress-percent {
      color: #ecf0f1;
      font-size: 16px;
      margin-top: 15px;
    }
    
    /* Hidden class for clean removal for animation */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div id="loading-text">Loading Metaverse Quiztal World<br/>Get ready Quiztal Masters</div>
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-percent">0%</div>
  </div>
  <script type="module" src="/src/main.ts"></script> <!-- Use absolute path for Vite -->
  
  <script>
    // Update progress bar function
    function updateProgress(percent) {
      const progressBar = document.getElementById('progress-bar');
      const progressPercent = document.getElementById('progress-percent');
      
      if (progressBar && progressPercent) {
        progressBar.style.width = percent + '%';
        progressPercent.textContent = Math.round(percent) + '%';
      }
    }
    
    // Hide loading screen function
    function hideLoadingScreen() {
      const loadingContainer = document.getElementById('loading-container');
      if (loadingContainer) {
        // Add fade out effect
        loadingContainer.style.transition = 'opacity 0.5s ease';
        loadingContainer.style.opacity = '0';
        
        // Remove after transition
        setTimeout(() => {
          loadingContainer.classList.add('hidden');
        }, 500);
      }
    }
    
    // Expose the functions to the global scope so the game can call them
    window.updateProgress = updateProgress;
    window.hideLoadingScreen = hideLoadingScreen;
  </script>
</body>
</html>
